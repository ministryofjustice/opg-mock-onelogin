name: "[Workflow] Pull Request"

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  security-events: write
  pull-requests: write
  actions: none
  checks: none
  deployments: none
  issues: write
  packages: none
  repository-projects: none
  statuses: none

defaults:
  run:
    shell: bash

jobs:
  semver_tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"

      - name: "Generate semver tag and release"
        id: semver_tag
        uses: ministryofjustice/opg-github-actions/actions/semver@b8868247a908f74fafe1905701391580575a6d35 # v4.3.10
        with:
          create_release: false
          default_bump: ${{ github.event_name == 'workflow_dispatch' && 'none' || 'minor' }}
          prerelease: ${{ github.ref_name == 'main' && 'false' || 'true' }}

  build_scan_push:
    needs: [semver_tag]
    name: "Build, scan and push the image"
    uses: ./.github/workflows/_docker_build_scan_push.yml
    with:
      build_latest: false
      semver_tag: "${{ needs.semver_tag.outputs.tag }}"
    secrets: inherit

  end:
    name: 'End of workflow'
    runs-on: 'ubuntu-latest'
    needs: [semver_tag, build_scan_push]
    steps:
      - name: "Output data"
        run: |
          echo "== BRANCH =="
          echo "Branch: ${{ needs.branch_name.outputs.branch }}"
          echo "== SEMVER =="
          echo "Tag: ${{ needs.semver_tag.outputs.tag }}"